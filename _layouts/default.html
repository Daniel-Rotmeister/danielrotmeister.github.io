<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <style>
    /* Configurações gerais da página */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #333333;
      background-color: #ffffff;
      max-width: 800px; /* Limita a largura do texto para facilitar a leitura */
      margin: 40px auto; /* Centraliza o site na tela */
      padding: 0 20px;
    }

    /* Estilização dos links */
    a {
      color: #0366d6; /* Azul moderno padrão do GitHub */
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }

    /* Estilização do seu menu de navegação */
    header {
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid #eaeaea; /* Linha sutil separando o menu do conteúdo */
    }
    
    /* Suaviza a cor das fontes dos títulos */
    h1, h2, h3 {
      color: #24292e;
    }
  </style>
</head>
<body>

  <header>
    {% include nav.html %}
  </header>

  <main>
    {{ content }}
  </main>

</body>
</html>
